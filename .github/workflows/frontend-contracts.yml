name: Frontend contract checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate forms catalog
        run: node scripts/validate-forms-catalog.mjs

      - name: Run frontend contract checks
        run: node scripts/verify-frontend-contracts.mjs
